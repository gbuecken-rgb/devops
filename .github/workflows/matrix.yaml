name: Matrix
on:
  workflow_dispatch:

jobs:
  run-npm-install:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node-version: [18, 20, 'lts/*']
        os: [ubuntu-latest, ubuntu-22.04]
        exclude:
          - node-version: 18
            os: ubuntu-22.04

    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: run install
        shell: bash
        run: |
          npm install
          npm help
